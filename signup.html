      <!-- Card header -->

        <h2 class="text-2xl font-bold tracking-tight text-slate-900 dark:text-white">Create Account</h2>
        <p class="text-xs text-slate-500 dark:text-slate-400 mt-1.5">Sign up to access live mock simulators and study handouts</p>
      </div>

      <!-- Form Inputs -->
      <form id="student-signup-form" class="space-y-4" onsubmit="event.preventDefault(); alert('Registration successful! You can now log in.'); window.location.href='login.html';">
        <div>
          <label for="s-name" class="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1">Full Name</label>
          <input type="text" id="s-name" required placeholder="Alex Morgan" class="w-full px-4 py-2.5 text-sm bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 text-slate-900 dark:text-white rounded-xl focus:outline-none focus:border-blue-500 focus:bg-white dark:focus:bg-slate-900 transition-colors">
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label for="s-email" class="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1">Email Address</label>
            <input type="email" id="s-email" required placeholder="alex@domain.com" class="w-full px-4 py-2.5 text-sm bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 text-slate-900 dark:text-white rounded-xl focus:outline-none focus:border-blue-500 focus:bg-white dark:focus:bg-slate-900 transition-colors">
          </div>
          <div>
            <label for="s-phone" class="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1">Phone Number</label>
            <input type="tel" id="s-phone" required placeholder="+1 (555) 000-0000" class="w-full px-4 py-2.5 text-sm bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 text-slate-900 dark:text-white rounded-xl focus:outline-none focus:border-blue-500 focus:bg-white dark:focus:bg-slate-900 transition-colors">

        </div>

            <option value="upsc">UPSC Civil Services</option>

    <label for="s-pass" class="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1">Password</label>

        id="s-pass" 
        required 
        placeholder="••••••••"

        type="button" 
        onclick="togglePassword('s-pass', 'eye-icon-1')"
        class="absolute right-4 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors focus:outline-none"
        aria-label="Toggle password visibility"

        </svg>
      </button>
    </div>
  </div>

        type="password" 
        id="s-pass-confirm"

    </div>
  </div>
</div>
<script>
  function togglePassword(inputId, iconId) {
  const passwordInput = document.getElementById(inputId);
  const eyeIcon = document.getElementById(iconId);
  
  if (passwordInput.type === 'password') {
    passwordInput.type = 'text';
    // Slash eye icon (Visible)
    eyeIcon.innerHTML = `
      <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />
    `;
  } else {
    passwordInput.type = 'password';
    // Regular eye icon (Hidden)
    eyeIcon.innerHTML = `
      <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
      <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
    `;
  }
}
</script>

      </div>

      <!-- Sign In link redirect -->
      <div class="text-center text-xs text-slate-500">
        Already registered? <a href="login.html" class="text-blue-600 dark:text-blue-450 hover:underline font-semibold">Sign In</a>
