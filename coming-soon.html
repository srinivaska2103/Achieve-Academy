  <!-- Countdown Timer script -->
  <script>
    // Countdown Target: 45 days from current date
    const targetDate = new Date();
    targetDate.setDate(targetDate.getDate() + 45);

    const updateTimer = () => {
      const now = new Date().getTime();
      const diff = targetDate.getTime() - now;

      if (diff <= 0) {
        clearInterval(timerInterval);
        return;
      }

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((diff % (1000 * 60)) / 1000);

      document.getElementById('c-days').textContent = days.toString().padStart(2, '0');
      document.getElementById('c-hours').textContent = hours.toString().padStart(2, '0');
      document.getElementById('c-minutes').textContent = minutes.toString().padStart(2, '0');
      document.getElementById('c-seconds').textContent = seconds.toString().padStart(2, '0');
    };

    updateTimer();
    const timerInterval = setInterval(updateTimer, 1000);
  </script>
